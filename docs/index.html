<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#16613f"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="雀影连连"><meta name="mobile-web-app-capable" content="yes"><link rel="manifest" href="manifest.webmanifest?v=9"><link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png?v=9"><title>雀影连连</title><style>
*{box-sizing:border-box}body{margin:0;background:#91bd8e;color:#14231c;font-family:system-ui,"Microsoft YaHei"}.app{max-width:720px;margin:auto;padding:12px}.top,.stats,.tools{display:flex;align-items:center;justify-content:space-between;gap:8px}.top h1{margin:0;font-size:22px}.pill{background:#fff;border:3px solid #17352b;border-radius:18px;padding:7px 12px;box-shadow:0 3px #397147}.levels{display:flex;gap:5px;justify-content:center;margin:12px 0}.levels button{width:34px;height:34px;border:2px solid #17352b;border-radius:50%;background:#fff}.levels .active{background:#ffd348}.levels button:disabled{opacity:.4}.stats{background:#ffffffb8;border:3px solid #17352b;border-radius:12px;padding:9px 12px;font-size:12px}.stats b{font-size:17px}.rule{text-align:center;font-size:12px;font-weight:700;margin:10px}.board-wrap{position:relative;max-width:560px;margin:auto}.board{position:relative;display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px;background:#78a97b;border-radius:8px}.tile{aspect-ratio:3/4;position:relative;overflow:hidden;border:2px solid #17352b;border-radius:8px;background:linear-gradient(135deg,#fffef7,#f3f1e6);box-shadow:inset -2px -3px #c2d0c3,0 3px #3ea866,0 5px #126f46;display:grid;place-items:center;padding:6%;font-size:20px}.tile.sel{outline:4px solid #ffe23e}.tile.empty{visibility:hidden}.wan{display:grid;text-align:center;line-height:.85;font-family:KaiTi,serif}.wan b{font-size:clamp(18px,6vw,34px)}.wan i{font-style:normal;color:#d93435;font-weight:900}.dots,.bams{width:88%;height:88%;display:grid;grid-template-columns:repeat(3,1fr);place-items:center;gap:4%;overflow:hidden}.dots i{width:min(75%,14px);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,#fff 0 17%,#e4363d 20% 40%,#fff 42% 49%,#188b45 52% 72%,#075c36 74%)}.dots.n1,.dots.n2{grid-template-columns:1fr}.dots.n1 i{width:25px}.dots.n2 i{width:14px}.dots.n4{grid-template-columns:repeat(2,1fr)}.bams i{width:7px;height:75%;border-radius:5px;background:linear-gradient(90deg,#087f42,#56bd6a,#075c36)}.path{position:absolute;inset:4px;width:calc(100% - 8px);height:calc(100% - 8px);z-index:4;pointer-events:none}.path polyline{fill:none;stroke:#ffe23e;stroke-width:.09;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 2px #fff)}.msg{text-align:center;min-height:28px;padding:7px;font-size:12px;font-weight:700}.tools button{flex:1;border:3px solid #17352b;border-radius:11px;background:#20c5ee;color:#fff;padding:10px 3px;font-weight:900;box-shadow:0 4px #087491}.tools small{display:block;font-size:8px}.win{position:fixed;inset:0;background:#153a29bb;display:none;place-items:center;z-index:8}.win.show{display:grid}.card{background:#fff;border:4px solid #17352b;border-radius:15px;padding:25px;text-align:center}.card button{background:#20c5ee;border:2px solid #17352b;border-radius:9px;padding:9px 20px}@media(min-width:700px){.tile{font-size:26px}.app{padding:20px}}
</style></head><body><main class="app"><header class="top"><h1>雀影连连</h1><button class="pill" id="gems">◆ 80</button></header><nav class="levels" id="levels"></nav><section class="stats"><span>第 <b id="lv">1</b>/200关</span><span>剩余 <b id="left">100</b></span><span>用时 <b id="clock">00:00</b></span><span>得分 <b id="score">0</b></span></section><div class="rule" id="rule">本关机制：牌阵固定 · 点击麻将开始计时</div><div class="board-wrap"><div class="board" id="board"></div><div class="msg" id="msg">选择两张相同的牌开始消除</div></div><section class="tools"><button id="hint">💡 提示<small>◆15</small></button><button id="refresh">🔄 刷新<small>◆30</small></button><button id="clear">⭐ 花色消除<small>◆60</small></button></section></main><div class="win" id="win"><div class="card"><h2>通关成功！</h2><p id="reward"></p><button id="next">进入下一关</button></div></div><script>
const R=10,C=10,ranks='一二三四五六七八九',grav=['none','right','left','down','up','vertical','horizontal'],rules=['牌阵固定','向右补位','向左补位','向下补位','向上补位','上下分流','左右分流'];let level=0,max=+(localStorage.mjMax||0),gems=+(localStorage.mjGems||80),board=[],sel=null,time=0,running=false,score=0,busy=false,clearMode=false,timer,bestTimes=JSON.parse(localStorage.mjBestTimes||'{}');
const $=s=>document.querySelector(s),id=(r,c)=>r*C+c,sh=a=>{a=[...a];for(let i=a.length-1;i;i--){let j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a};
function face(v){return`<img class="tile-image" src="tiles/tile-real-${v}.png?v=10" alt="" draggable="false">`}
function path(a,b){if(!a||board[id(...a)]!==board[id(...b)])return null;let H=R+2,W=C+2,d=[[1,0],[-1,0],[0,1],[0,-1]],s=[a[0]+1,a[1]+1],t=[b[0]+1,b[1]+1],q=d.map((_,x)=>({r:s[0],c:s[1],x,z:0,p:[s]})),seen={};let open=(r,c)=>r==0||c==0||r==H-1||c==W-1||board[id(r-1,c-1)]==null||(r-1==b[0]&&c-1==b[1]);while(q.length){let u=q.shift();for(let x=0;x<4;x++){let z=u.z+(x!=u.x),r=u.r+d[x][0],c=u.c+d[x][1],k=r+','+c+','+x;if(z>2||r<0||c<0||r>=H||c>=W||!open(r,c)||seen[k]<=z)continue;seen[k]=z;let p=x==u.x?u.p:[...u.p,[u.r,u.c]];if(r==t[0]&&c==t[1])return[...p,t].map(x=>[x[0]-1,x[1]-1]);q.push({r,c,x,z,p})}}return null}
function move(){let g={};board.forEach((v,i)=>v!=null&&(g[v]??=[]).push([i/C|0,i%C]));for(let a of Object.values(g))for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++){let p=path(a[i],a[j]);if(p)return[a[i],a[j],p]}return null}
function gravity(a){let type=grav[level%7],o=Array(R*C).fill(null),row=(r,x,s)=>x.forEach((v,i)=>o[id(r,s+i)]=v),col=(c,x,s)=>x.forEach((v,i)=>o[id(s+i,c)]=v);if(type=='none')return a;if(type=='left'||type=='right')for(let r=0;r<R;r++){let x=a.slice(r*C,(r+1)*C).filter(v=>v!=null);row(r,x,type=='left'?0:C-x.length)}else if(type=='up'||type=='down')for(let c=0;c<C;c++){let x=Array.from({length:R},(_,r)=>a[id(r,c)]).filter(v=>v!=null);col(c,x,type=='up'?0:R-x.length)}else if(type=='vertical'){let m=Math.ceil(R/2);for(let c=0;c<C;c++){let x=Array.from({length:m},(_,r)=>a[id(r,c)]).filter(v=>v!=null),y=Array.from({length:R-m},(_,r)=>a[id(r+m,c)]).filter(v=>v!=null);col(c,x,0);col(c,y,R-y.length)}}else{let m=Math.ceil(C/2);for(let r=0;r<R;r++){let x=a.slice(r*C,r*C+m).filter(v=>v!=null),y=a.slice(r*C+m,(r+1)*C).filter(v=>v!=null);row(r,x,0);row(r,y,C-y.length)}}return o}
function draw(){let b=$('#board'),tiles=[...b.querySelectorAll('.tile')];if(tiles.length!==board.length){let lines=[...b.querySelectorAll('.path')];b.innerHTML=board.map((v,i)=>`<button class="tile" data-i="${i}" data-v=""></button>`).join('');lines.forEach(x=>b.append(x));tiles=[...b.querySelectorAll('.tile')]}tiles.forEach((t,i)=>{let v=board[i],value=v==null?'':String(v);t.className=`tile ${v==null?'empty':''} ${sel&&id(...sel)==i?'sel':''}`;if(t.dataset.v!==value){t.dataset.v=value;t.innerHTML=v==null?'':face(v)}});let hit=e=>{e.preventDefault();let t=e.target.closest('.tile');if(!t||t.classList.contains('empty'))return;let now=Date.now(),i=+t.dataset.i;if(now-(+b.dataset.inputAt||0)<80&&i===+b.dataset.inputTile)return;b.dataset.inputAt=now;b.dataset.inputTile=i;pick(i)};b.ontouchstart=hit;b.onpointerdown=hit;b.onmousedown=hit;b.onpointerup=e=>e.preventDefault();b.onclick=e=>e.preventDefault()}
function selectTile(next){if(sel)document.querySelector(`.tile[data-i="${id(...sel)}"]`)?.classList.remove('sel');sel=next;if(sel)document.querySelector(`.tile[data-i="${id(...sel)}"]`)?.classList.add('sel')}
function start(n){if(n>max)return;level=n;let count=Math.min(12+(n/8|0),27),a=[];for(let i=0;i<R*C/2;i++)a.push(i%count,i%count);board=sh(a);sel=null;time=0;running=false;busy=false;clearMode=false;$('#win').classList.remove('show');ui();draw()}
function ui(){$('#lv').textContent=level+1;$('#left').textContent=board.filter(v=>v!=null).length;$('#score').textContent=score;$('#gems').textContent='◆ '+gems;$('#rule').textContent='本关机制：'+rules[level%7]+' · '+(running?'计时中':'点击麻将开始计时');$('#levels').innerHTML=Array.from({length:5},(_,k)=>Math.max(0,Math.min(level-2,195))+k).map(n=>`<button data-l=${n} ${n>max?'disabled':''} class=${n==level?'active':''}>${n>max?'🔒':n+1}</button>`).join('');document.querySelectorAll('[data-l]').forEach(x=>x.onclick=()=>start(+x.dataset.l))}
function line(p){let s=document.createElementNS('http://www.w3.org/2000/svg','svg');s.setAttribute('class','path');s.setAttribute('viewBox',`0 0 ${C} ${R}`);s.setAttribute('preserveAspectRatio','none');s.innerHTML=`<polyline points="${p.map(([r,c])=>Math.max(.08,Math.min(C-.08,c+.5))+','+Math.max(.08,Math.min(R-.08,r+.5))).join(' ')}"/>`;$('#board').append(s);setTimeout(()=>s.remove(),200)}
function pick(i){if(!running){running=true;ui()}let p=[i/C|0,i%C];if(clearMode){let v=board[i];board=gravity(board.map(x=>x==v?null:x));clearMode=false;document.activeElement?.blur();draw();check();return}if(!sel){selectTile(p);return}if(id(...sel)==i){selectTile(null);return}let route=path(sel,p);if(!route){selectTile(p);$('#msg').textContent='无法连接，请重新选择';return}let a=sel;board[id(...a)]=board[i]=null;board=gravity(board);sel=null;score+=110;document.activeElement?.blur();draw();line(route);ui();check()}
function check(){ui();if(!board.some(v=>v!=null)){running=false;let reward=20+(level/10|0)*5,old=bestTimes[level],record=!old||time<old;if(record){bestTimes[level]=time;localStorage.mjBestTimes=JSON.stringify(bestTimes)}gems+=reward;max=Math.max(max,Math.min(199,level+1));localStorage.mjMax=max;localStorage.mjGems=gems;$('#reward').textContent=`奖励 ◆${reward}，下一关已激活${record?' · 新的最快纪录 '+String(time/60|0).padStart(2,'0')+':'+String(time%60).padStart(2,'0'):''}`;$('#win').classList.add('show')}else if(!move())noMoveRefresh()}
function shuffleBoard(){let pos=board.map((v,i)=>v==null?-1:i).filter(i=>i>=0),v=sh(pos.map(i=>board[i]));pos.forEach((p,i)=>board[p]=v[i]);draw();$('#msg').textContent='无解，已自动刷新'}
function noMoveRefresh(){if(document.querySelector('.no-move-toast'))return;let tip=document.createElement('div');tip.className='no-move-toast';tip.textContent='当前无解，即将自动刷新';document.body.append(tip);setTimeout(()=>{tip.remove();shuffleBoard()},300)}
$('#hint').onclick=()=>{if(gems<15)return;let m=move();if(m){gems-=15;sel=m[0];draw();$('#msg').textContent='已标出一张可连接的牌';ui()}};$('#refresh').onclick=()=>{if(gems<30)return;gems-=30;shuffleBoard();ui()};$('#clear').onclick=()=>{if(gems<60)return;gems-=60;clearMode=true;$('#msg').textContent='点击要消除的花色';ui()};$('#next').onclick=()=>start(Math.min(199,level+1));setInterval(()=>{if(running&&!busy){time++;$('#clock').textContent=String(time/60|0).padStart(2,'0')+':'+String(time%60).padStart(2,'0')}},1000);
</script><script src="obstacles-v19.js?v=21"></script><script src="ui-overlays.js?v=21"></script><script src="cache-progress.js?v=21"></script><script src="save-tools.js?v=21"></script><script>if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=21',{updateViaCache:'none'}))</script><link rel="stylesheet" href="compact.css?v=21"><link rel="stylesheet" href="font-fixes.css?v=21"><link rel="stylesheet" href="board-10x10.css?v=21"><link rel="stylesheet" href="theme-v4.css?v=21"><link rel="stylesheet" href="overlays-v6.css?v=21"><link rel="stylesheet" href="pwa-v9.css?v=21"><link rel="stylesheet" href="obstacles-v19.css?v=21"></body></html>
